<html>
<head>
	<meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SC TTK Calculator</title>

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
	
	<div class="container">
		<div class="row">
			<h1>SC Weapon TTK calculator with crafting</h1>
		</div>
		<div class="row">
			<h2>Weapon config 🔫</h2>
			<form action="javascript:;" onsubmit=" calculateTTK( this )">
				<div class='mb-3'>
					<label class="form-label" for="weaponAlpha">Weapon alpha per shot</label>
					<input class="form-control" id="weaponAlpha" type="text">
				</div>
				<div class='mb-3'>
					<label class="form-label" for="weaponRpm">Weapon RPM</label>
					<input class="form-control" id="weaponRpm" type="text">
				</div>
				<div class='mb-3'>
					<label class="form-label" for="weaponAlphaMod">Alpha (impact force) crafting modifier</label>
					<input class="form-control" id="weaponAlphaMod" type="text" value="1">
				</div>
				<div class='mb-3'>
					<label class="form-label" for="weaponRpmMod">Fire rate crafting modifier</label>
					<input class="form-control" id="weaponRpmMod" type="text" value="1">
				</div>
				<div class='mb-3'>
					<label class="form-label" for="weaponRpmMod">Armor type</label>
					<select class="form-select" aria-label="Heavy" id="armorType">
					  <option selected value="heavy">Heavy</option>
					  <option value="medium">Medium</option>
					  <option value="light">Light</option>
					  <option value="no_armor">No armor</option>
					</select>
				</div>
				<input class="btn btn-primary" type="submit" value="Calculate TTK">
			</form>
		</div>

	  <div class="row">
	    <h2>Results 📊</h2>
	    <div class="col">
		  <h3>Body</h3>
		  <strong>TTK: </strong><span id="ttkBody"></span>s (<span id="shotBody"></span> shots)<br>
		  <strong>Against best armor: </strong><span id="ttkBodyMaxQ"></span>s (<span id="shotBodyMaxQ"></span> shots)<br>
		</div>
	  	<div class="col">
		  <h3>Head</h3>
		  <strong>TTK: </strong><span id="ttkHead"></span>s (<span id="shotHead"></span> shots)<br>
		  <strong>Against best armor: </strong><span id="ttkHeadMaxQ"></span>s (<span id="shotHeadMaxQ"></span> shots)<br>
		</div>
		<div class="col">
		  <h3>Limb</h3>
		  <strong>TTK: </strong><span id="ttkLimb"></span>s (<span id="shotLimb"></span> shots)<br>
		  <strong>Against best armor: </strong><span id="ttkLimbMaxQ"></span>s (<span id="shotLimbMaxQ"></span> shots)<br>
		</div>
	  </div>
	  <div class="row"></div>
	</div>

	
	

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

	<script>
		const hp = 100;
		const headshotMod = 1.8;
		const limbMod = 0.8;

		function calculateTTK() {
		  let headHp = hp;
		  let headMaxQHp = hp;
		  let bodyHp = hp;
		  let bodyMaxQHp = hp;
		  let limbHp = hp;
		  let limbMaxQHp = hp;

		  /* ----------------
		  --- CONFIG---
		  ----------------- */

		  let alpha = document.getElementById("weaponAlpha").value;
		  let rpm = document.getElementById("weaponRpm").value;
		  let craftAlphaMod = document.getElementById("weaponAlphaMod").value;
		  let craftRpmMod = document.getElementById("weaponRpmMod").value;

		  let armorType = document.getElementById("armorType").value;

		  switch (armorType) {
			  	case 'no_armor':
			    	armorMod = 1;
			    	armorModMaxQ = 1;
			    	break;
			  	case 'light':
			    	armorMod = 0.8;
			    	armorModMaxQ = 0.78;
			    	break;
			  	case 'medium':
			  		armorMod = 0.7;
			    	armorModMaxQ = 0.67;
			    	break
			  	case 'heavy':
			  	default:
			    	armorMod = 0.6;
			    	armorModMaxQ = 0.54;
			}

			console.log(armorMod);
			console.log(armorModMaxQ);


		  //-----------------

		  alpha = alpha * craftAlphaMod;
		  rpm = rpm * craftRpmMod;

		  let timeBetweenShot = 60 / rpm;

		  /* ----------------
		  -----BODY TTK------
		  ----------------- */

		  let ttkBody = -timeBetweenShot;
		  let ttkBodyMaxQ = -timeBetweenShot;

		  let nbShotBody = 0;
		  let nbShotBodyMaxQ = 0;

		  let bodyAlpha = alpha * armorMod;
		  while (bodyHp > 0) {
		    bodyHp -= bodyAlpha;
		    ttkBody += timeBetweenShot;
		    ++nbShotBody;
		  }

		  bodyAlpha = alpha * armorModMaxQ;
		  while (bodyMaxQHp > 0) {
		    bodyMaxQHp -= bodyAlpha;
		    ttkBodyMaxQ += timeBetweenShot;
		    ++nbShotBodyMaxQ;
		  }

		  /* ----------------
		  -----HEAD TTK------
		  ----------------- */

		  let ttkHead = -timeBetweenShot;
		  let ttkHeadMaxQ = -timeBetweenShot;

		  let nbShotHead = 0;
		  let nbShotHeadMaxQ = 0;

		  let headAlpha = alpha * headshotMod * armorMod;
		  while (headHp > 0) {
		    headHp -= headAlpha;
		    ttkHead += timeBetweenShot;
		    ++nbShotHead;
		  }

		  headAlpha = alpha * headshotMod * armorModMaxQ;
		  while (headMaxQHp > 0) {
		    headMaxQHp -= headAlpha;
		    ttkHeadMaxQ += timeBetweenShot;
		    ++nbShotHeadMaxQ;
		  }

		  /* ----------------
		  -----LIMB TTK------
		  ----------------- */

		  let ttkLimb = -timeBetweenShot;
		  let ttkLimbMaxQ = -timeBetweenShot;

		  let nbShotLimb = 0;
		  let nbShotLimbMaxQ = 0;

		  let limbAlpha = alpha * limbMod * armorMod;
		  while (limbHp > 0) {
		    limbHp -= limbAlpha;
		    ttkLimb += timeBetweenShot;
		    ++nbShotLimb;
		  }

		  limbAlpha = alpha * limbMod * armorModMaxQ;
		  while (limbMaxQHp > 0) {
		    limbMaxQHp -= limbAlpha;
		    ttkLimbMaxQ += timeBetweenShot;
		    ++nbShotLimbMaxQ;
		  }

		  function title(string) {
		  console.log('-'.repeat(string.length + 6));
		  console.log('-'.repeat(3) + string + '-'.repeat(3));
		  console.log('-'.repeat(string.length + 6));
		  }

		  /* ----------------
		  ------RESULT-------
		  ----------------- */
		  document.getElementById("ttkBody").innerHTML = ttkBody;
		  document.getElementById("shotBody").innerHTML = nbShotBody;
		  document.getElementById("ttkBodyMaxQ").innerHTML = ttkBodyMaxQ;
		  document.getElementById("shotBodyMaxQ").innerHTML = nbShotBodyMaxQ;

		  document.getElementById("ttkHead").innerHTML = ttkHead;
		  document.getElementById("shotHead").innerHTML = nbShotHead;
		  document.getElementById("ttkHeadMaxQ").innerHTML = ttkHeadMaxQ;
		  document.getElementById("shotHeadMaxQ").innerHTML = nbShotHeadMaxQ;

		  document.getElementById("ttkLimb").innerHTML = ttkLimb;
		  document.getElementById("shotLimb").innerHTML = nbShotLimb;
		  document.getElementById("ttkLimbMaxQ").innerHTML = ttkLimbMaxQ;
		  document.getElementById("shotLimbMaxQ").innerHTML = nbShotLimbMaxQ;

		  title("BODY TTK");
		  console.log("TTK: " + ttkBody + "(" + nbShotBody + ")");
		  console.log("TTK max Q: " + ttkBodyMaxQ + "(" + nbShotBodyMaxQ + ")");
		  title("HEAD TTK");
		  console.log("TTK: " + ttkHead + "(" + nbShotHead + ")");
		  console.log("TTK max Q: " + ttkHeadMaxQ + "(" + nbShotHeadMaxQ + ")");
		  title("LIMB TTK");
		  console.log("TTK: " + ttkLimb + "(" + nbShotLimb + ")");
		  console.log("TTK max Q: " + ttkLimbMaxQ + "(" + nbShotLimbMaxQ + ")");
		}
	</script>
</body>
</html>
