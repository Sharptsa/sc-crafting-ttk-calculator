<!doctype html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>SC Crafting TTK Calculator</title>

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
	<div class="container">
		<div class="row pt-3 pb-3 justify-content-between">
			<div class='col-10'>
				<h1>SC Weapon TTK calculator for crafting</h1>
			</div>
			<div class='col form-check form-switch d-inline-flex justify-content-end'>
				<input class="form-check-input" type="checkbox" role="switch" id="darkModeSwitch" onclick="toggleDarkMode()">
				<label class="form-check-label ps-1" for="switchCheckDefault"><strong>Dark Mode</strong></label>
			</div>
		</div>
		<div class="row pb-3">
			<div class='col'>
				<h2>Tools ⚙️</h2>
				<ul>
					<li>📋 <a href="https://docs.google.com/spreadsheets/d/1BD87issjyxeOLYAV5V6vafawD2TGuaftnfXPAyIo_2w/edit?gid=869785434#gid=869785434" target="_blank" rel="noopener noreferrer">SC FPS Data 4.7 stats table</a></li>
					<li>🔨 <a href="https://sc-craft.tools/?category=Weapons+%2F+LMG&category=Weapons+%2F+Pistol&category=Weapons+%2F+Rifle&category=Weapons+%2F+Shotgun&category=Weapons+%2F+SMG&category=Weapons+%2F+Sniper" target="_blank" rel="noopener noreferrer">sc-craft.tools</a> to get modifiers per material quality</li>
				</ul>
			</div>
		</div>
		<div class="row pb-3">
			<h2>Weapon Stats 🔫</h2>
			<form action="javascript:;" onsubmit=" calculateTTK( this )">
				<div class='mb-3'>
					<label class="form-label" for="weaponAlpha">Alpha damage per shot</label>
					<input class="form-control" id="weaponAlpha" type="text">
				</div>
				<div class='mb-3'>
					<label class="form-label" for="weaponRpm">Fire rate (RPM)</label>
					<input class="form-control" id="weaponRpm" type="text">
				</div>
				<div class='mb-3'>
					<label class="form-label" for="weaponAlphaModRange">Crafting: Alpha damage modifier (impact force)</label>
					<input type="range" class="form-range" id="weaponAlphaModRange" min=1 max=1.300 value=1 step=0.005>
					<input class="form-control" id="weaponAlphaModValue" type="text" value=1.000>
				</div>
				<div class='mb-3'>
					<label class="form-label" for="weaponRpmModRange">Crafting: Fire rate modifier</label>
					<input type="range" class="form-range" id="weaponRpmModRange" min=1 max=1.200 value=1 step=0.005>
					<input class="form-control" id="weaponRpmModValue" type="text" value=1.000>
				</div>
				<div class='mb-3'>
					<label class="form-label" for="weaponAlphaAttachModRange">Attachment: Alpha damage modifier</label>
					<input type="range" class="form-range" id="weaponAlphaModAttachRange" min=1 max=1.200 value=1 step=0.005>
					<input class="form-control" id="weaponAlphaModAttachValue" type="text" value=1.000>
				</div>
				<div class='mb-3'>
					<label class="form-label" for="weaponRpmModAttachRange">Attachment: Fire rate modifier</label>
					<input type="range" class="form-range" id="weaponRpmModAttachRange" min=1 max=1.200 value=1 step=0.005>
					<input class="form-control" id="weaponRpmModAttachValue" type="text" value=1.000>
				</div>
				<div class='mb-3'>
					<label class="form-label" for="armorType">Armor type</label>
					<select class="form-select" aria-label="Heavy" id="armorType">
						<option selected value="heavy">Heavy</option>
						<option value="medium">Medium</option>
						<option value="light">Light</option>
						<option value="no_armor">No armor</option>
					</select>
				</div>
				<input class="btn btn-primary" type="submit" value="Calculate TTK">
			</form>
		</div>

		<div class="row pb-3 gx-3">
			<h2>Results 📊</h2>
			<div class="col">
				<div class='card bg-danger-subtle'>
					<div class="card-body">
						<h3>Head 😐</h3>
						<strong>TTK: </strong><span id="ttkHead"></span> <span id="shotHead"></span><br>
						<strong>Against 1k quality armor: </strong><span id="ttkHeadMaxQ"></span> <span id="shotHeadMaxQ"></span><br>
					</div>
				</div>
			</div>
			<div class="col">
				<div class='card bg-warning-subtle'>
					<div class="card-body">
						<h3>Body 👕</h3>
						<strong>TTK: </strong><span id="ttkBody"></span> <span id="shotBody"></span><br>
						<strong>Against 1k quality armor: </strong><span id="ttkBodyMaxQ"></span> <span id="shotBodyMaxQ"></span><br>
					</div>	
				</div>
			</div>
			<div class="col">
				<div class='card bg-success-subtle'>
					<div class="card-body">
						<h3>Limbs 🦵</h3>
						<strong>TTK: </strong><span id="ttkLimb"></span> <span id="shotLimb"></span><br>
						<strong>Against 1k quality armor: </strong><span id="ttkLimbMaxQ"></span> <span id="shotLimbMaxQ"></span><br>
					</div>	
				</div>
			</div>
		</div>
		<div class="row"></div>
	</div>




	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
	<script>
		// MOD RANGE AND INPUT SYNC
		const weaponAlphaModRange = document.getElementById("weaponAlphaModRange")
		const weaponAlphaModValue = document.getElementById("weaponAlphaModValue")

		weaponAlphaModRange.addEventListener("input", (event) => {
			weaponAlphaModValue.value = Number.parseFloat(event.target.value).toFixed(3)
		})
		weaponAlphaModValue.addEventListener("input", (event) => {
			weaponAlphaModRange.value = Number.parseFloat(event.target.value).toFixed(3)
		})

		const weaponRpmModRange = document.getElementById("weaponRpmModRange")
		const weaponRpmModValue = document.getElementById("weaponRpmModValue")

		weaponRpmModRange.addEventListener("input", (event) => {
			weaponRpmModValue.value = Number.parseFloat(event.target.value).toFixed(3)
		})
		weaponRpmModValue.addEventListener("input", (event) => {
			weaponRpmModRange.value = Number.parseFloat(event.target.value).toFixed(3)
		})

		const weaponAlphaModAttachRange = document.getElementById("weaponAlphaModAttachRange")
		const weaponAlphaModAttachValue = document.getElementById("weaponAlphaModAttachValue")

		weaponAlphaModAttachRange.addEventListener("input", (event) => {
			weaponAlphaModAttachValue.value = Number.parseFloat(event.target.value).toFixed(3)
		})
		weaponAlphaModValue.addEventListener("input", (event) => {
			weaponAlphaModAttachRange.value = Number.parseFloat(event.target.value).toFixed(3)
		})

		const weaponRpmModAttachRange = document.getElementById("weaponRpmModAttachRange")
		const weaponRpmModAttachValue = document.getElementById("weaponRpmModAttachValue")

		weaponRpmModAttachRange.addEventListener("input", (event) => {
			weaponRpmModAttachValue.value = Number.parseFloat(event.target.value).toFixed(3)
		})
		weaponRpmModAttachValue.addEventListener("input", (event) => {
			weaponRpmModAttachRange.value = Number.parseFloat(event.target.value).toFixed(3)
		})

		// DARK MODE
		const darkModeSwitch = document.getElementById("darkModeSwitch")

		const getStoredTheme = () => localStorage.getItem('theme')
		const setStoredTheme = theme => localStorage.setItem('theme', theme)

		const getPreferredTheme = () => {
			const storedTheme = getStoredTheme()
			if (storedTheme) {
				return storedTheme
			}

			return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'
		}

		const setTheme = theme => {
			if (theme === 'auto') {
				document.documentElement.setAttribute('data-bs-theme', (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'))
			} else {
				document.documentElement.setAttribute('data-bs-theme', theme)
			}
		}

		const showActiveTheme = (theme) => {
			if (theme === 'dark' && !darkModeSwitch.checked) {
				darkModeSwitch.click()
			}
		}

		window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
			const storedTheme = getStoredTheme()
			if (storedTheme !== 'light' && storedTheme !== 'dark') {
				setTheme(getPreferredTheme())
			}
		})

		window.addEventListener('DOMContentLoaded', () => {
			preferredTheme = getPreferredTheme()
			setStoredTheme(preferredTheme)
			setTheme(preferredTheme)
			showActiveTheme(preferredTheme)
		})

		const toggleDarkMode = (e) => {
			if (darkModeSwitch.checked) {
				setTheme('dark')
				setStoredTheme('dark')
			} else {
				setTheme('light')
				setStoredTheme('light')
			}
		}		
	</script>
	<script>
		const hp = 100
		const headshotMod = 1.8
		const limbMod = 0.8

		const calculateTTK = () => {
			/* ----------------
			------ STATS ------
			----------------- */
			let alpha = Number.parseFloat(document.getElementById("weaponAlpha").value)
			let rpm = Number.parseFloat(document.getElementById("weaponRpm").value)
			const craftAlphaMod = Number.parseFloat(document.getElementById("weaponAlphaModValue").value)
			const craftRpmMod = Number.parseFloat(document.getElementById("weaponRpmModValue").value)
			const attachAlphaMod = Number.parseFloat(document.getElementById("weaponAlphaModAttachValue").value)
			const attachRpmMod = Number.parseFloat(document.getElementById("weaponRpmModAttachValue").value)

			let armorType = document.getElementById("armorType").value

			switch (armorType) {
				case 'no_armor':
					armorMod = 1
					armorModMaxQ = 1
					break
				case 'light':
					armorMod = 0.8
					armorModMaxQ = 0.78
					break
				case 'medium':
					armorMod = 0.7
					armorModMaxQ = 0.67
					break
				case 'heavy':
				default:
					armorMod = 0.6
					armorModMaxQ = 0.54
			}


		  	/* ----------------
			--- CALCULATION ---
			----------------- */
			if (alpha == NaN || rpm == NaN || rpm == 0) {
				return
			}

			alpha = alpha * craftAlphaMod * attachAlphaMod
			const dmg = alpha * armorMod
			const dmgMaxArmor = alpha * armorModMaxQ

			rpm = rpm * craftRpmMod * attachRpmMod
			const timeBetweenShot = 60 / rpm

			const compute = (hp, dmg, timeBetweenShot) => {
				let ttk = -timeBetweenShot
				let nbShot = 0
				while (hp > 0) {
					hp -= dmg
					ttk += timeBetweenShot
					++nbShot
				}
				return {ttk, nbShot}
			}

		  	const body = compute(hp, dmg, timeBetweenShot)
			const bodyMaxArmor = compute(hp, dmgMaxArmor, timeBetweenShot)

		  	const head = compute(hp, dmg * headshotMod, timeBetweenShot)
		  	const headMaxArmor = compute(hp, dmgMaxArmor * headshotMod, timeBetweenShot)

		  	const limbs = compute(hp, dmg * limbMod, timeBetweenShot)
		  	const limbsMaxArmor = compute(hp, dmgMaxArmor * limbMod, timeBetweenShot)


		  	/* ----------------
		  	------RESULTS------
		  	----------------- */
			const nbShotStr = (nbShot) => {
				let str = nbShot + ' shot'
		  		if (nbShot > 1) {
		  			str += 's'
		  		}
		  		return '(' + str + ')'
		  	}

		  	const ttkStr = (ttk) => {
		  		return Number.parseFloat(ttk).toFixed(3) + "s"
		  	}

			document.getElementById("ttkBody").innerHTML = ttkStr(body.ttk)
			document.getElementById("shotBody").innerHTML = nbShotStr(body.nbShot)
			document.getElementById("ttkBodyMaxQ").innerHTML = ttkStr(bodyMaxArmor.ttk)
			document.getElementById("shotBodyMaxQ").innerHTML = nbShotStr(bodyMaxArmor.nbShot)

			document.getElementById("ttkHead").innerHTML = ttkStr(head.ttk)
			document.getElementById("shotHead").innerHTML = nbShotStr(head.nbShot)
			document.getElementById("ttkHeadMaxQ").innerHTML = ttkStr(headMaxArmor.ttk)
			document.getElementById("shotHeadMaxQ").innerHTML = nbShotStr(headMaxArmor.nbShot)

			document.getElementById("ttkLimb").innerHTML = ttkStr(limbs.ttk)
			document.getElementById("shotLimb").innerHTML = nbShotStr(limbs.nbShot)
			document.getElementById("ttkLimbMaxQ").innerHTML = ttkStr(limbsMaxArmor.ttk)
			document.getElementById("shotLimbMaxQ").innerHTML = nbShotStr(limbsMaxArmor.nbShot)
		}
	</script>
</body>
</html>
